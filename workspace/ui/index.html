<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K.A.I. // KITEZH INTERFACE</title>
  <style>
    /* ── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c10;
      --panel:     #0d1117;
      --border:    #1a2a1a;
      --accent:    #00ff99;
      --accent2:   #00ccff;
      --dim:       #3a5a3a;
      --text:      #c8d8c8;
      --text-dim:  #5a7a5a;
      --danger:    #ff4455;
      --warn:      #ffaa00;
      --radius:    4px;
      --font-mono: "Courier New", Courier, monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Layout ───────────────────────────────────────────────────── */
    #app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      grid-template-columns: 200px 1fr;
      grid-template-areas:
        "header  header"
        "sidebar chat"
        "footer  footer";
      height: 100vh;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    #header {
      grid-area: header;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }

    #header .logo {
      font-size: 18px;
      font-weight: bold;
      color: var(--accent);
      letter-spacing: 3px;
      text-shadow: 0 0 10px var(--accent);
    }

    #header .tagline {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      flex: 1;
    }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 6px var(--danger);
      transition: background 0.4s, box-shadow 0.4s;
    }
    #status-dot.online {
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    #status-label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    /* ── Sidebar ──────────────────────────────────────────────────── */
    #sidebar {
      grid-area: sidebar;
      border-right: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar h3 {
      padding: 10px 12px;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
    }

    #user-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .user-entry {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      font-size: 11px;
      color: var(--text);
    }

    .user-entry::before {
      content: "▸";
      color: var(--accent2);
    }

    /* ── Chat area ────────────────────────────────────────────────── */
    #chat {
      grid-area: chat;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #log {
      flex: 1;
      overflow-y: auto;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* custom scrollbar */
    #log::-webkit-scrollbar { width: 4px; }
    #log::-webkit-scrollbar-track { background: transparent; }
    #log::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

    .msg {
      display: flex;
      gap: 10px;
      line-height: 1.55;
      animation: fadein 0.2s ease;
    }

    @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

    .msg .ts {
      flex-shrink: 0;
      color: var(--text-dim);
      font-size: 10px;
      margin-top: 2px;
      min-width: 46px;
    }

    .msg .name {
      flex-shrink: 0;
      font-weight: bold;
      min-width: 100px;
      color: var(--accent2);
    }

    .msg.own .name { color: var(--accent); }

    .msg .body { color: var(--text); word-break: break-word; }

    .msg.system {
      justify-content: center;
      color: var(--text-dim);
      font-size: 11px;
      font-style: italic;
      padding: 2px 0;
    }

    .msg.system .body { color: var(--text-dim); }
    .msg.system .ts,
    .msg.system .name { display: none; }

    /* ── Input bar ────────────────────────────────────────────────── */
    #input-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      background: var(--panel);
    }

    #input-bar .prompt {
      color: var(--accent);
      font-size: 14px;
      user-select: none;
    }

    #msg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      caret-color: var(--accent);
    }

    #msg-input::placeholder { color: var(--text-dim); }

    #send-btn {
      background: none;
      border: 1px solid var(--dim);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 11px;
      padding: 4px 10px;
      cursor: pointer;
      border-radius: var(--radius);
      letter-spacing: 1px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #send-btn:hover {
      border-color: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    /* ── Footer ───────────────────────────────────────────────────── */
    #footer {
      grid-area: footer;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 5px 18px;
      border-top: 1px solid var(--border);
      background: var(--panel);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    #footer span b { color: var(--accent); }

    /* ── Join overlay ─────────────────────────────────────────────── */
    #join-overlay {
      position: fixed; inset: 0;
      background: rgba(8,12,16,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #join-box {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 32px 40px;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #join-box h2 {
      color: var(--accent);
      font-size: 18px;
      letter-spacing: 4px;
      text-shadow: 0 0 10px var(--accent);
    }

    #join-box p {
      color: var(--text-dim);
      font-size: 11px;
      line-height: 1.6;
    }

    #join-box input {
      background: var(--bg);
      border: 1px solid var(--dim);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      border-radius: var(--radius);
      transition: border-color 0.2s;
    }
    #join-box input:focus { border-color: var(--accent); }

    #join-btn {
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 13px;
      padding: 8px;
      cursor: pointer;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-radius: var(--radius);
      transition: background 0.2s, box-shadow 0.2s;
    }
    #join-btn:hover {
      background: rgba(0,255,153,0.08);
      box-shadow: 0 0 12px var(--accent);
    }

    #join-error { color: var(--danger); font-size: 11px; display: none; }
  </style>
</head>
<body>

<!-- ── Join overlay ──────────────────────────────────────────── -->
<div id="join-overlay">
  <div id="join-box">
    <h2>K.A.I.</h2>
    <p>Kitezh Autonomous Intelligence<br>Enter your handle to connect to the live feed.</p>
    <input id="name-input" type="text" placeholder="display_name" maxlength="32" autocomplete="off" />
    <div id="join-error">Handle cannot be empty.</div>
    <button id="join-btn">// CONNECT</button>
  </div>
</div>

<!-- ── App shell ─────────────────────────────────────────────── -->
<div id="app">

  <header id="header">
    <span class="logo">K.A.I.</span>
    <span class="tagline">KITEZH AUTONOMOUS INTELLIGENCE // LIVE FEED</span>
    <div id="status-dot"></div>
    <span id="status-label">OFFLINE</span>
  </header>

  <aside id="sidebar">
    <h3>// Online</h3>
    <div id="user-list"></div>
  </aside>

  <section id="chat">
    <div id="log"></div>
    <div id="input-bar">
      <span class="prompt">›</span>
      <input id="msg-input" type="text" placeholder="transmit..." autocomplete="off" maxlength="2000" disabled />
      <button id="send-btn" disabled>SEND</button>
    </div>
  </section>

  <footer id="footer">
    <span>NODE <b id="footer-user">—</b></span>
    <span>CHANNEL <b>kai.general</b></span>
    <span id="footer-count">0 ONLINE</span>
  </footer>

</div>

<script>
  /* ── State ─────────────────────────────────────────────────── */
  let ws        = null;
  let myId      = null;
  let myName    = null;

  /* ── DOM refs ──────────────────────────────────────────────── */
  const joinOverlay = document.getElementById("join-overlay");
  const nameInput   = document.getElementById("name-input");
  const joinBtn     = document.getElementById("join-btn");
  const joinError   = document.getElementById("join-error");
  const log         = document.getElementById("log");
  const msgInput    = document.getElementById("msg-input");
  const sendBtn     = document.getElementById("send-btn");
  const statusDot   = document.getElementById("status-dot");
  const statusLabel = document.getElementById("status-label");
  const userList    = document.getElementById("user-list");
  const footerUser  = document.getElementById("footer-user");
  const footerCount = document.getElementById("footer-count");

  /* ── Utilities ─────────────────────────────────────────────── */
  function generateUserId() {
    return "u_" + Math.random().toString(36).slice(2, 10);
  }

  function fmtTime(ts) {
    const d = new Date(ts * 1000);
    return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function escapeHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function appendMessage(type, data) {
    const row = document.createElement("div");
    row.className = "msg " + type + (data.user_id === myId ? " own" : "");

    if (type === "system") {
      row.innerHTML = `<span class="body">${escapeHtml(data.content)}</span>`;
    } else {
      row.innerHTML =
        `<span class="ts">${fmtTime(data.timestamp)}</span>` +
        `<span class="name">${escapeHtml(data.display_name)}</span>` +
        `<span class="body">${escapeHtml(data.content)}</span>`;
    }

    log.appendChild(row);
    log.scrollTop = log.scrollHeight;
  }

  function renderHistory(messages) {
    log.innerHTML = "";
    messages.forEach(m => appendMessage("message", m));
  }

  function renderUsers(users) {
    userList.innerHTML = users
      .map(u => `<div class="user-entry">${escapeHtml(u.display_name)}</div>`)
      .join("");
    footerCount.textContent = users.length + " ONLINE";
  }

  function setConnected(online) {
    if (online) {
      statusDot.classList.add("online");
      statusLabel.textContent = "CONNECTED";
      msgInput.disabled = false;
      sendBtn.disabled  = false;
      msgInput.focus();
    } else {
      statusDot.classList.remove("online");
      statusLabel.textContent = "OFFLINE";
      msgInput.disabled = true;
      sendBtn.disabled  = true;
    }
  }

  /* ── WebSocket ─────────────────────────────────────────────── */
  function connect(displayName) {
    myId   = generateUserId();
    myName = displayName;

    const proto = location.protocol === "https:" ? "wss" : "ws";
    const url   = `${proto}://${location.host}/ws/${myId}?display_name=${encodeURIComponent(displayName)}`;

    ws = new WebSocket(url);

    ws.onopen = () => {
      setConnected(true);
      footerUser.textContent = displayName;
      joinOverlay.style.display = "none";
    };

    ws.onmessage = (evt) => {
      let msg;
      try { msg = JSON.parse(evt.data); } catch { return; }

      switch (msg.type) {
        case "history":
          renderHistory(msg.messages);
          break;
        case "message":
          appendMessage("message", msg);
          break;
        case "system":
          appendMessage("system", msg);
          if (msg.users) renderUsers(msg.users);
          break;
      }
    };

    ws.onclose = () => {
      setConnected(false);
      appendMessage("system", { content: "⬡ Connection lost. Refresh to reconnect." });
    };

    ws.onerror = () => {
      setConnected(false);
    };
  }

  /* ── Send ──────────────────────────────────────────────────── */
  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(text);
    msgInput.value = "";
  }

  sendBtn.addEventListener("click", sendMessage);
  msgInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  /* ── Join ──────────────────────────────────────────────────── */
  function attemptJoin() {
    const name = nameInput.value.trim();
    if (!name) { joinError.style.display = "block"; return; }
    joinError.style.display = "none";
    connect(name);
  }

  joinBtn.addEventListener("click", attemptJoin);
  nameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") attemptJoin(); });
  nameInput.focus();
</script>
</body>
</html>
